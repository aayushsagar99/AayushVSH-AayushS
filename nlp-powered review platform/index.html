<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Review Analyzer</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; }
        .positive { color: green; }
        .negative { color: red; }
    </style>
</head>
<body>

<div class="card">
    <h2>Submit a Review</h2>
    <p>Our AI will analyze the tone of your feedback.</p>
    
    <form id="reviewForm">
        <label for="userReview">Your Experience:</label>
        <textarea id="userReview" placeholder="Type your review here..." required></textarea>
        <button type="submit">Analyze Sentiment</button>
    </form>

    <!-- This div will be updated by JavaScript later -->
    <div id="result"></div>
</div>

<script>
    // Basic placeholder logic to show how the UI updates
    document.getElementById('reviewForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const text = document.getElementById('userReview').value;
        const resultDiv = document.getElementById('result');
        
        // This is where your Python/API logic would eventually go
        resultDiv.innerHTML = "Processing review...";
    });
    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const text = document.getElementById('userReview').value;
        const resultDiv = document.getElementById('result');

        resultDiv.innerHTML = "AI is thinking...";

        try {
            // Sends text to your Python backend
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            
            // Updates HTML with the sentiment result
            resultDiv.className = data.label.toLowerCase(); 
            resultDiv.innerHTML = `Sentiment: ${data.label} (Score: ${data.score})`;
        } catch (error) {
            resultDiv.innerHTML = "Error connecting to AI backend.";
    }});

</script>

</body>
</html>
