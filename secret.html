<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>secret-message</title>
    <style>
        body {
            background-color: #1e1e1e; /* Dark editor background */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
            font-size: 24px;
        }

        button {
            background-color: #1e1e1e; /* Dark editor background */
            border-color:white;
            cursor: pointer;
            letter-spacing: 1px;
            height: 100px;
            /* Remove fixed width to let it grow */
            width: auto; 
            padding: 0 40px;
            /* Forces text onto one line */
            white-space: nowrap; 
            /* Your desired font size */
            font-size: 60px; 
        }



        /* Syntax Highlighting Colors from Image */
        .tag    { color: #569cd6; } /* Soft Blue */
        .attr   { color: #9cdcfe; } /* Light Cyan */
        .string { color: #ce9178; } /* Peach/Terra-cotta */
        .punct  { color: #808080; } /* Gray for <, >, / and = */
        .text   { color: #d4d4d4; } /* Off-white for content */

    </style>
</head>
<body>

    <button id="final-portal" onclick="revealSecret()">
        <span class="punct">&lt;</span><span class="tag">html</span> 
        <span class="attr">class</span><span class="punct">=</span><span class="string">"css"</span><span class="punct">&gt;</span><span class="text">js</span><span class="punct">&lt;/</span><span class="tag">html</span><span class="punct">&gt;</span>
    </button>

    <script>
        function revealSecret() {
            console.log("Secret revealed!");
            // Add your logic here
        }
    </script>
</body>
</html>
