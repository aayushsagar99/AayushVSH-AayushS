<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Platform Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">FinanceApp</div>
            <ul>
                <li class="active">Accounts</li>
                <li>Transfers</li>
                <li>Rewards</li>
                <li>Settings</li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <h1>Welcome back, User</h1>
                <button  style="padding: 15px; background-color: #0047bb; color:white;" id="logout-btn"><strong>Logout</strong></button>
            </header>

            <!-- Balance Overview -->
            <section class="overview-grid">
                <div class="card">
                    <h3>Checking</h3>
                    <p class="balance" id="checking-balance">$1,250.00</p>
                </div>
                <div class="card">
                    <h3>Savings</h3>
                    <p class="balance" id="savings-balance">$5,400.25</p>
                </div>
            </section>

            <!-- Transaction History -->
            <section class="transactions">
                <h2>Recent Transactions</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-list">
                        <!-- JS will inject rows here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
