<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail</title>
    <style>
        .button{background-color: blueviolet;}
    </style>
</head>
<body>
    <h1>Who do you want to mail?</h1>
    <input placeholder="Enter Email" type="text">
    <h1>Click here to mail Sagar VS</h1>
    <button class="button"><a href="mailto:vs.sagar@gmail.com">mail</a></button>
</body>
<script>
    const email="vs.sagar@gmail.com"
    
        HTMLBodyElement(
            <button class="button"><a href="mailto:${email}">mail</a></button>
        )
</script>
</html>
