<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepseek API Chat </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <header class="header">
            <h2 class="title">Deepseek API</h2>
        </header>
        <div class="content">
            <section class="answer-section">
                Hello! How can I help you today? 👋😊
            </section>
            <section class="question-section">
                Hello!
            </section>
        </div>
        <footer class="chat-form">
            <input class="chat-input" id="chatInput" type="text" placeholder="Type message">
            <button class="send-button">
                <!-- This is the exact path for the icon in your image -->
                <svg width="60" height="60" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org">
                    <!-- Top wing -->
                    <path d="M2.01 3L2 10l15 2-15 2 .01 7L23 12 2.01 3zM4 8.25l7.51 1.12-7.51-3.37v2.25z" />
                    
                    <!-- This "point" or gap is created by the negative space in the path above -->
                    </svg>


                </svg>
            </button>
        </footer>
    </main>
</body>
</html>
