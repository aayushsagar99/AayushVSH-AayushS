<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <style>
            body {
                background-color: rgb(100, 100, 100);
                /* Fixed positioning fills the screen and prevents scrolling */
                position: fixed; 
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                /* This centers the .main-box perfectly */
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0;
            }

            /* Update .main-box to stack the display and buttons */
            .main-box {
                display: flex;
                flex-direction: column;
                gap: 1rem; /* Space between display and buttons */
                width: 400px;
                height: auto; /* Height adapts to content */
                background-color: rgb(30, 30, 30);
                padding: 2rem;
                border-radius: 2rem;
            }

            /* Ensure the display box looks like a screen */
            .Answer-box {
                /* ... your existing styles ... */
                
                overflow: hidden;       /* Prevents text from physically leaving the box */
                white-space: nowrap;    /* Keeps numbers on a single line */
                text-overflow: clip;    /* Cuts off the text at the edge */
                display: flex;
                justify-content: flex-end; /* Keeps newest numbers visible on the right */
                align-items: center;
                
                /* Optional: allow horizontal scrolling if it gets too long */
                overflow-x: auto; 
            }

            /* Hide scrollbar for a cleaner look (Chrome/Safari) */
            .Answer-box::-webkit-scrollbar {
                display: none;
            }


            /* Create the 4-column grid for buttons */
            .button-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            /* Basic button styling */
            .btn {
                padding: 20px;
                font-size: 1.5rem;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                background: #444;
                color: white;
                transition: 0.2s;
            }

            .btn:hover { background: #666; }

            /* Special button colors */
            .btn-op { background-color: #ff9f43; } /* Operators */
            .btn-func { background-color: #a5a5a5; color: black; } /* AC/DEL */
            .btn-equals { 
                background-color: #28a745; 
                grid-row: span 2; /* Makes '=' taller */
            }
            .btn-zero { grid-column: span 2; } /* Makes '0' wider */


        </style>
        <script src="script.js" defer></script>
    </head>
    <body>
        <main class="container">
        <div class="main-box">
            <!-- Display Screen -->
            <div class="Answer-box" id="display">0</div>
            
            <!-- Buttons Grid -->
            <div class="button-grid">
                <button class="btn btn-func" onclick="clearDisplay()">AC</button>
                <button class="btn btn-func" onclick="deleteLast()">DEL</button>
                <button class="btn btn-op" onclick="appendOperator('/')">÷</button>
                <button class="btn btn-op" onclick="appendOperator('*')">×</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn btn-op" onclick="appendOperator('-')">-</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn btn-op" onclick="appendOperator('+')">+</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>

                <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
            </div>
        </div>
        </main>
    </body>
    <script>
        const display = document.querySelector('.Answer-box');
        const MAX_CHARS = 12; // Limits digits so they don't break the UI

        function appendNumber(num) {
            // 1. Safety: Don't let the string get too long
            if (display.innerText.length >= MAX_CHARS) return;

            // 2. Logic: Handle the initial '0' or 'Error' state
            if (display.innerText === "0" || display.innerText === "Error") {
                display.innerText = num;
            } else {
                display.innerText += num;
            }
            
            updateFontSize();
        }

        function appendOperator(op) {
            const lastChar = display.innerText.slice(-1);
            const operators = ['+', '-', '*', '/'];

            // 3. Logic: Don't allow two operators in a row (e.g., "++")
            if (operators.includes(lastChar)) {
                display.innerText = display.innerText.slice(0, -1) + op;
            } else {
                display.innerText += op;
            }
        }

        function appendDecimal() {
            // 4. Logic: Don't allow multiple decimals in one number
            const parts = display.innerText.split(/[\+\-\*\/]/);
            const currentNumber = parts[parts.length - 1];

            if (!currentNumber.includes('.')) {
                display.innerText += '.';
            }
        }

        function clearDisplay() {
            display.innerText = "0";
            updateFontSize();
        }

        function deleteLast() {
            if (display.innerText.length > 1) {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = "0";
            }
            updateFontSize();
        }

        function calculate() {
            try {
                // 5. Logic: Evaluate the string. 
                // We use Number.isInteger to keep decimals clean (e.g., 0.1 + 0.2)
                let result = eval(display.innerText);
                
                // Round long decimals to fit the screen
                if (!Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(4)); 
                }

                display.innerText = result;
            } catch (e) {
                display.innerText = "Error";
            }
            updateFontSize();
        }

        // 6. UI: Shrink text as it gets longer to stay inside the box
        function updateFontSize() {

            const len = display.innerText.length;
            if (len > 57) {
                display.style.fontSize = "0.75rem";
            }
            else if (len > 54) {
                display.style.fontSize = "0.75rem";
            }
            else if (len > 51) {
                display.style.fontSize = "0.75rem";
            } else if (len > 48) {
                display.style.fontSize = "0.85rem";
            } else if (len > 45) {
                display.style.fontSize = "0.9rem";
            } else if (len > 42) {
                display.style.fontSize = "0.95rem";
            } else if (len > 39) {
                display.style.fontSize = "1rem";
            } else if (len > 36) {
                display.style.fontSize = "1.05rem";
            } else if (len > 33) {
                display.style.fontSize = "1.1rem";
            } else if (len > 30) {
                display.style.fontSize = "1.15rem";
            } else if (len > 27) {
                display.style.fontSize = "1.2rem";
            } else if (len > 24) {
                display.style.fontSize = "0.75rem";
            } else if (len > 21) {
                display.style.fontSize = "0.85rem";
            } else if (len > 18) {
                display.style.fontSize = "1.35rem";
            } else if (len > 15) {
                display.style.fontSize = "1.4rem";
            }else if (len > 12) {
                display.style.fontSize = "1.5rem";
            } else if (len > 9) {
                display.style.fontSize = "2rem";
            } else if (len > 6) {
                display.style.fontSize = "2.25rem";
            } else if (len > 3) {
                display.style.fontSize = "2.5rem";
            }  else (len > 0) {
                display.style.fontSize = "3rem";
            }
        };
    </script>
</html>
